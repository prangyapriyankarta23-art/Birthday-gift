<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 🎂</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
      overflow:hidden;
      position:relative;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.25);
      border-radius:25px;
      padding:35px 25px;
      text-align:center;
      color:white;
      box-shadow:0 8px 30px rgba(0,0,0,0.2);
      animation:fadeIn 1.2s ease;
    }

    .emoji{
      font-size:70px;
      animation:bounce 2s infinite;
    }

    h1{
      font-size:2.3rem;
      margin-top:15px;
      font-weight:700;
    }

    h2{
      font-size:1.4rem;
      margin-top:10px;
      color:#fff8dc;
      font-weight:600;
    }

    p{
      margin-top:20px;
      line-height:1.7;
      font-size:1rem;
      color:#fdfdfd;
    }

    button{
      margin-top:28px;
      padding:14px 28px;
      border:none;
      border-radius:50px;
      background:white;
      color:#ff4b7d;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 4px 15px rgba(0,0,0,0.2);
    }

    button:hover{
      transform:scale(1.06);
      background:#fff0f5;
    }

    .floating{
      position:absolute;
      font-size:24px;
      animation:float 7s linear infinite;
      opacity:0.8;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) rotate(0deg);
      }
      100%{
        transform:translateY(-120vh) rotate(360deg);
      }
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:480px){
      h1{
        font-size:1.9rem;
      }

      h2{
        font-size:1.1rem;
      }

      p{
        font-size:0.95rem;
      }

      .emoji{
        font-size:60px;
      }

      .card{
        padding:30px 20px;
      }
    }
  </style>
</head>

<body>

  <!-- Floating Emojis -->
  <div class="floating" style="left:10%; animation-duration:8s;">🎈</div>
  <div class="floating" style="left:25%; animation-duration:6s;">🎉</div>
  <div class="floating" style="left:50%; animation-duration:7s;">💖</div>
  <div class="floating" style="left:75%; animation-duration:9s;">🎂</div>
  <div class="floating" style="left:90%; animation-duration:5s;">✨</div>

  <!-- Birthday Card -->
  <div class="card">
    <div class="emoji">🎂</div>

    <h1>Happy Birthday!</h1>

    <h2>Dear Best Friend 💖</h2>

    <p>
      Wishing you endless happiness, success, and beautiful memories today and always.
      May your smile shine brighter than ever and all your dreams come true! ✨
    </p>

    <button onclick="celebrate()">Celebrate 🎉</button>
  </div>

  <script>
    // Auto Confetti on Load
    window.onload = () => {
      launchConfetti();
    };

    function celebrate(){
      launchConfetti();
    }

    function launchConfetti(){
      const duration = 3000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 6,
          angle: 60,
          spread: 70,
          origin: { x: 0 }
        });

        confetti({
          particleCount: 6,
          angle: 120,
          spread: 70,
          origin: { x: 1 }
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }
  </script>

</body>
</html>
